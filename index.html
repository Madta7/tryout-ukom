<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT UKOM Ners - Premium V3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
        .anti-curang { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .blur-ekstrem { filter: blur(15px); pointer-events: none; opacity: 0.5; transition: all 0.2s ease-in-out; }
        #peringatan-curang { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(220, 38, 38, 0.9); color: white; padding: 20px 40px; border-radius: 10px; font-size: 24px; font-weight: bold; z-index: 9999; text-align: center; }
        .blur-ekstrem ~ #peringatan-curang { display: block; }
    </style>
</head>
<body class="anti-curang">
    <div id="root"></div>
    <div id="peringatan-curang">DILARANG PINDAH TAB ATAU MENYONTEK! ⚠️</div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('copy', event => event.preventDefault());
        document.addEventListener('cut', event => event.preventDefault());
        document.addEventListener('paste', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.keyCode === 73)) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.keyCode === 67)) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.keyCode === 74)) e.preventDefault();
            if (e.ctrlKey && (e.key === 'U' || e.keyCode === 85)) e.preventDefault();
            if (e.ctrlKey && (e.key === 'P' || e.keyCode === 80)) e.preventDefault(); 
        });
        document.addEventListener("visibilitychange", () => {
            const rootDiv = document.getElementById("root");
            if (document.hidden) {
                rootDiv.classList.add('blur-ekstrem');
                document.title = "⚠️ JANGAN MENYONTEK!";
            } else {
                rootDiv.classList.remove('blur-ekstrem');
                document.title = "CBT UKOM Ners - Premium V3";
            }
        });
    </script>
